<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double H Concierge | Luxury Travel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --navy: #0A1A2F;
            --navy-light: #0F2A3F;
            --gold: #C6A43B;
            --gold-dark: #9B7E2E;
            --cream: #F5F0E6;
            --white: #FFFFFF;
            --gray: #6B7280;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--navy);
            color: var(--cream);
            line-height: 1.5;
        }
        .navbar {
            background: rgba(10, 26, 47, 0.98);
            backdrop-filter: blur(10px);
            padding: 1.2rem 2rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(198, 164, 59, 0.2);
        }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }
        .logo h1 span { color: var(--gold); }
        .logo p { font-size: 0.7rem; color: var(--gray); }
        .nav-links { display: flex; gap: 2rem; }
        .nav-links a {
            color: var(--cream);
            text-decoration: none;
            cursor: pointer;
        }
        .nav-links a:hover { color: var(--gold); }
        .hero {
            min-height: 85vh;
            background: linear-gradient(135deg, rgba(10, 26, 47, 0.95), rgba(10, 26, 47, 0.85)), url('https://images.pexels.com/photos/2166711/pexels-photo-2166711.jpeg?auto=compress&cs=tinysrgb&w=1600');
            background-size: cover;
            display: flex;
            align-items: center;
            text-align: center;
            padding-top: 80px;
        }
        .hero-content { max-width: 800px; margin: 0 auto; padding: 4rem 2rem; }
        .hero-badge {
            display: inline-block;
            padding: 0.4rem 1.2rem;
            background: rgba(198, 164, 59, 0.15);
            border-radius: 50px;
            font-size: 0.75rem;
            color: var(--gold);
            margin-bottom: 1.5rem;
        }
        .hero h1 { font-size: 3.5rem; font-weight: 700; margin-bottom: 1rem; }
        .hero h1 span { color: var(--gold); }
        .hero p { font-size: 1.1rem; color: var(--gray); margin-bottom: 2rem; }
        .search-card {
            max-width: 1200px;
            margin: -2rem auto 3rem;
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .search-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.2rem;
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--gray);
            margin-bottom: 0.5rem;
        }
        .form-group input, .form-group select {
            padding: 0.9rem;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
        }
        .search-btn {
            background: var(--gold);
            color: var(--navy);
            border: none;
            padding: 0.9rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            width: 100%;
        }
        .search-btn:hover { background: var(--gold-dark); }
        .results-section {
            max-width: 1200px;
            margin: 3rem auto;
            display: none;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .section-header h2 span { color: var(--gold); }
        .flight-card {
            background: var(--navy-light);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 1px solid rgba(198, 164, 59, 0.2);
        }
        .flight-card:hover { border-color: var(--gold); transform: translateX(5px); }
        .price-amount { font-size: 1.5rem; font-weight: 700; color: var(--gold); }
        .book-btn {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            color: var(--navy);
        }
        .modal-content input {
            width: 100%;
            padding: 0.9rem;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .confirm-btn {
            background: var(--gold);
            color: var(--navy);
            border: none;
            padding: 0.9rem;
            width: 100%;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .footer {
            background: var(--navy-light);
            text-align: center;
            padding: 2rem;
            margin-top: 4rem;
        }
        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .flight-card { flex-direction: column; text-align: center; gap: 1rem; }
            .nav-links { gap: 1rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h1>DOUBLE H <span>CONCIERGE</span></h1>
                <p>Global Luxury Travel</p>
            </div>
            <div class="nav-links">
                <a onclick="showSearch()">Search Flights</a>
                <a onclick="showBookings()">My Bookings</a>
            </div>
        </div>
    </nav>

    <div class="hero">
        <div class="hero-content">
            <div class="hero-badge">EST. 2024</div>
            <h1>Your Journey,<br><span>Perfected</span></h1>
            <p>Global destinations • Luxury travel • Bespoke experiences</p>
        </div>
    </div>

    <div class="search-card" id="searchSection">
        <div class="search-form">
            <div class="form-group">
                <label>From</label>
                <select id="fromCity"></select>
            </div>
            <div class="form-group">
                <label>To</label>
                <select id="toCity"></select>
            </div>
            <div class="form-group">
                <label>Departure Date</label>
                <input type="date" id="departureDate">
            </div>
            <div class="form-group">
                <label>Cabin Class</label>
                <select id="cabinClass">
                    <option value="economy">Economy</option>
                    <option value="business">Business</option>
                    <option value="first">First Class</option>
                </select>
            </div>
        </div>
        <button class="search-btn" onclick="searchFlights()">Search Flights</button>
    </div>

    <div id="resultsSection" class="results-section">
        <div class="section-header">
            <h2>Available <span>Flights</span></h2>
            <div id="resultCount"></div>
        </div>
        <div id="flightList"></div>
    </div>

    <div id="bookingsSection" class="results-section">
        <div class="section-header">
            <h2>My <span>Bookings</span></h2>
        </div>
        <div id="bookingsList"></div>
    </div>

    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <h3>Complete Your Booking</h3>
            <div id="modalDetails"></div>
            <input type="text" id="passengerName" placeholder="Full Name">
            <input type="email" id="passengerEmail" placeholder="Email">
            <input type="tel" id="passengerPhone" placeholder="Phone">
            <button class="confirm-btn" onclick="confirmBooking()">Confirm Booking</button>
            <button onclick="closeModal()" style="margin-top:0.5rem; width:100%; padding:0.5rem;">Cancel</button>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2024 Double H Concierge. Luxury travel redefined.</p>
    </footer>

    <script>
        let selectedFlight = null;
        let allFlights = [];

        document.getElementById('departureDate').value = new Date().toISOString().split('T')[0];

        async function loadCities() {
            const response = await fetch('/api/cities');
            const cities = await response.json();
            const fromSelect = document.getElementById('fromCity');
            const toSelect = document.getElementById('toCity');
            cities.forEach(city => {
                fromSelect.innerHTML += `<option value="${city}">${city}</option>`;
                toSelect.innerHTML += `<option value="${city}">${city}</option>`;
            });
        }
        loadCities();

        async function searchFlights() {
            const from = document.getElementById('fromCity').value;
            const to = document.getElementById('toCity').value;
            const date = document.getElementById('departureDate').value;
            const cabin = document.getElementById('cabinClass').value;

            if (!from || !to) {
                alert('Please select departure and destination');
                return;
            }

            const response = await fetch('/api/flights/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ from, to, date, cabin_class: cabin })
            });
            
            allFlights = await response.json();
            
            const flightList = document.getElementById('flightList');
            if (allFlights.length === 0) {
                flightList.innerHTML = '<div style="background:#0F2A3F; padding:2rem; text-align:center;">No flights found. Try different dates.</div>';
            } else {
                flightList.innerHTML = allFlights.map(flight => `
                    <div class="flight-card" onclick="selectFlight(${flight.id})">
                        <div>
                            <strong>✈️ ${flight.airline} - ${flight.flight_number}</strong><br>
                            ${flight.departure_time} → ${flight.arrival_time}<br>
                            ${flight.duration}
                        </div>
                        <div>
                            <div class="price-amount">₦${flight.price.toLocaleString()}</div>
                            <button class="book-btn">Book Now</button>
                        </div>
                    </div>
                `).join('');
            }
            document.getElementById('resultsSection').style.display = 'block';
        }

        function selectFlight(flightId) {
            selectedFlight = allFlights.find(f => f.id === flightId);
            document.getElementById('modalDetails').innerHTML = `
                <p><strong>${selectedFlight.airline} ${selectedFlight.flight_number}</strong></p>
                <p>${selectedFlight.from_city} → ${selectedFlight.to_city}</p>
                <p>Departure: ${selectedFlight.departure_time}</p>
                <p><strong>Total: ₦${selectedFlight.price.toLocaleString()}</strong></p>
            `;
            document.getElementById('bookingModal').style.display = 'flex';
        }

        async function confirmBooking() {
            const name = document.getElementById('passengerName').value;
            const email = document.getElementById('passengerEmail').value;
            const phone = document.getElementById('passengerPhone').value;

            if (!name || !email || !phone) {
                alert('Please fill all fields');
                return;
            }

            const response = await fetch('/api/bookings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    flight: selectedFlight,
                    passenger_name: name,
                    email: email,
                    phone: phone,
                    total_amount: selectedFlight.price
                })
            });

            const result = await response.json();
            alert(`✓ Booking Confirmed!\n\nReference: ${result.booking_reference}`);
            closeModal();
            document.getElementById('passengerName').value = '';
            document.getElementById('passengerEmail').value = '';
            document.getElementById('passengerPhone').value = '';
        }

        async function showBookings() {
            const response = await fetch('/api/bookings/my-bookings');
            const bookings = await response.json();
            
            const bookingsList = document.getElementById('bookingsList');
            if (bookings.length === 0) {
                bookingsList.innerHTML = '<div style="background:#0F2A3F; padding:2rem; text-align:center;">No bookings yet</div>';
            } else {
                bookingsList.innerHTML = bookings.map(b => `
                    <div class="flight-card">
                        <div>
                            <strong>✈️ ${b.booking_reference}</strong><br>
                            ${b.passenger_name}<br>
                            ${b.booking_date?.split('T')[0]}
                        </div>
                        <div>
                            <div class="price-amount">₦${b.total_amount?.toLocaleString()}</div>
                            <span style="color:var(--gold);">✓ ${b.status}</span>
                        </div>
                    </div>
                `).join('');
            }
            
            document.getElementById('searchSection').style.display = 'none';
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('bookingsSection').style.display = 'block';
        }

        function showSearch() {
            document.getElementById('searchSection').style.display = 'block';
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('bookingsSection').style.display = 'none';
        }

        function closeModal() {
            document.getElementById('bookingModal').style.display = 'none';
        }
    </script>
</body>
</html>
